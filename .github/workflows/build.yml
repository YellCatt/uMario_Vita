name: Build VPK

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: vitasdk/vitasdk:latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build VPK
        run: cmake . && make

      - name: Upload VPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: uMario.vpk
          path: uMario.vpk

      - name: Release (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: uMario.vpk

      - name: Release (latest)
        if: github.ref == 'refs/heads/master'
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: "Latest Build"
          prerelease: true
          artifacts: uMario.vpk
          allowUpdates: true
          replacesArtifacts: true
