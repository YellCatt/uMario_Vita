name: Build VPK

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: vitasdk/vitasdk:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build VPK
        run: cmake . && make

      - name: Upload VPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: uMario.vpk
          path: uMario.vpk
